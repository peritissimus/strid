name: StridApp
options:
  bundleIdPrefix: com.strid
  deploymentTarget:
    iOS: "26.0"
    macOS: "15.0"

packages:
  StridKit:
    path: ../StridKit

targets:
  StridApp:
    type: application
    platform: [iOS, macOS]
    deploymentTarget:
      iOS: "26.0"
      macOS: "15.0"
    sources:
      - path: .
        excludes:
          - "*.yml"
          - "*.md"
    dependencies:
      - package: StridKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.strid.StridApp
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
      configs:
        Debug:
          TARGETED_DEVICE_FAMILY[sdk=iphoneos*]: "1,2"
          TARGETED_DEVICE_FAMILY[sdk=iphonesimulator*]: "1,2"
          INFOPLIST_KEY_UIApplicationSceneManifest_Generation[sdk=iphoneos*]: YES
          INFOPLIST_KEY_UIApplicationSceneManifest_Generation[sdk=iphonesimulator*]: YES
          INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents[sdk=iphoneos*]: YES
          INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents[sdk=iphonesimulator*]: YES
          INFOPLIST_KEY_UILaunchScreen_Generation[sdk=iphoneos*]: YES
          INFOPLIST_KEY_UILaunchScreen_Generation[sdk=iphonesimulator*]: YES
          INFOPLIST_KEY_UISupportedInterfaceOrientations[sdk=iphoneos*]: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
          INFOPLIST_KEY_UISupportedInterfaceOrientations[sdk=iphonesimulator*]: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
          INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad[sdk=iphoneos*]: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
          INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad[sdk=iphonesimulator*]: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        Release:
          TARGETED_DEVICE_FAMILY[sdk=iphoneos*]: "1,2"
          TARGETED_DEVICE_FAMILY[sdk=iphonesimulator*]: "1,2"
          INFOPLIST_KEY_UIApplicationSceneManifest_Generation[sdk=iphoneos*]: YES
          INFOPLIST_KEY_UIApplicationSceneManifest_Generation[sdk=iphonesimulator*]: YES
          INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents[sdk=iphoneos*]: YES
          INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents[sdk=iphonesimulator*]: YES
          INFOPLIST_KEY_UILaunchScreen_Generation[sdk=iphoneos*]: YES
          INFOPLIST_KEY_UILaunchScreen_Generation[sdk=iphonesimulator*]: YES
          INFOPLIST_KEY_UISupportedInterfaceOrientations[sdk=iphoneos*]: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
          INFOPLIST_KEY_UISupportedInterfaceOrientations[sdk=iphonesimulator*]: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
          INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad[sdk=iphoneos*]: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
          INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad[sdk=iphonesimulator*]: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
